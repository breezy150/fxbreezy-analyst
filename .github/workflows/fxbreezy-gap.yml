name: FxBreezy Weekend Gap

on:
  schedule:
    - cron: "15 21 * * 0"      # Sunday 21:15 UTC — FX reopen (Sydney)
    - cron: "0 22 * * 0"       # Sunday 22:00 UTC
    - cron: "0 23 * * 0"       # Sunday 23:00 UTC
  workflow_dispatch: {}

concurrency:
  group: fxbreezy-gap
  cancel-in-progress: false

jobs:
  gap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r fxbreezy_bot/requirements.txt
      - name: Weekend gap analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fxbreezy_bot/scanner.py --gap
      - name: Persist dedupe state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fxbreezy_bot/state.json || true
          git commit -m "gap state [skip ci]" || echo "no state change"
          git push || echo "nothing to push"
